[[rule]]
toolName = "write_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "replace"
decision = "allow"
priority = 100

[[rule]]
toolName = "web_fetch"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [
  "mkdir",
  "grep",
  "ls",
  "echo",
  "find",
  "cat",
  "cp",
  "df",
  "tree",
  "head",
  "tail",
  "mv",
  "date"
]

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [ "coca", "ast-grep", "jq", "graphviz" ]

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [
  "git status",
  "git show",
  "git diff",
  "git log",
  "git add",
  "git commit"
]

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [
  "go",
  "java",
  "mvn",
  "golangci-lint",
  "python",
  "python3",
  "node"
]

[[rule]]
toolName = "activate_skill"
decision = "allow"
priority = 100

[[rule]]
decision = "allow"
priority = 950
toolName = "enter_plan_mode"
modes = [ "default", "autoEdit", "yolo" ]

[[rule]]
decision = "allow"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "echo", "md5" ]
modes = [ "autoEdit", "yolo" ]

[[rule]]
decision = "allow"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "cat" ]
allowRedirection = true
modes = [ "autoEdit", "yolo" ]
